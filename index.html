<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assests/style.css" />
    <title>Frontend Mentor | QR code component</title>
  </head>
  <body>
    <main>
      <div
        class="container bg d-flex align-items-center justify-content-center"
      >
        <div class="containe d-flex justify-content-center">
          <div
            class="card d-flex align-items-center justify-content-center qr-card"
          >
            <figure>
              <img
                src="./images/image-qr-code.png"
                alt="qr-code"
                class="d-flex align-items-center justify-content-center qr-image mt-3"
              />
            </figure>

            <div
              class="card-body d-flex flex-column justify-content-center align-items-center qr-content"
            >
              <h4 class="fw-bold">
                Improve your front-end skills by building projects
              </h4>
              <p id="card-text">
                Scan the QR code to visit Frontend Mentor and take your coding
                skills to the next level
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="attribution">
      <div class="container d-flex justify-content-center align-items-center">
        <div class="row">
          <div class="col-12">
            <p id="footer-content">
              Challenge by
              <a href="https://www.frontendmentor.io?ref=challenge"
                >Frontend Mentor</a
              >. Coded by <a href="#">Leelavathi kummari</a>.
            </p>
          </div>
        </div>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
